name: docker-release

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate stable release tag
        id: version
        shell: bash
        run: |
          ref_name="${GITHUB_REF_NAME}"
          if [[ ! "$ref_name" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "Tag '$ref_name' is not a stable vX.Y.Z release tag. Skipping publish."
            echo "publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "publish=true" >> "$GITHUB_OUTPUT"
          echo "version=${BASH_REMATCH[1]}.${BASH_REMATCH[2]}.${BASH_REMATCH[3]}" >> "$GITHUB_OUTPUT"
          echo "major=${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
          echo "minor=${BASH_REMATCH[2]}" >> "$GITHUB_OUTPUT"
          echo "patch=${BASH_REMATCH[3]}" >> "$GITHUB_OUTPUT"

      - name: Setup .NET
        if: steps.version.outputs.publish == 'true'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore
        if: steps.version.outputs.publish == 'true'
        run: dotnet restore ./Dxs.Consigliere.sln

      - name: Test
        if: steps.version.outputs.publish == 'true'
        run: dotnet test ./Dxs.Consigliere.sln -c Release --no-restore /m:1 -v minimal

      - name: Setup Docker Buildx
        if: steps.version.outputs.publish == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata
        if: steps.version.outputs.publish == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: dxs/consigliere
          labels: |
            org.opencontainers.image.title=Consigliere
            org.opencontainers.image.description=Open-source self-hosted indexer for building and querying managed subsets of BSV chain state.
            org.opencontainers.image.vendor=DXS
            org.opencontainers.image.version=${{ steps.version.outputs.version }}

      - name: Login to Docker Hub
        if: steps.version.outputs.publish == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push release image
        if: steps.version.outputs.publish == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            dxs/consigliere:${{ steps.version.outputs.version }}
            dxs/consigliere:${{ steps.version.outputs.major }}.${{ steps.version.outputs.minor }}
            dxs/consigliere:${{ steps.version.outputs.major }}
            dxs/consigliere:latest
          labels: ${{ steps.meta.outputs.labels }}
